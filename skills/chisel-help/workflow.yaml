name: chisel-workflow
version: 1
description: 遗留系统新增功能工作流

phases:
  - id: understand
    order: 1
    description: 理解 as-is：需求驱动裁剪，主干（overview、core-walkthrough、evidence-index、evidence-ledger、coverage-matrix、knowledge-candidates）必产出，枝干按需
    outputs:
      - as-is/overview.md
      - as-is/core-walkthrough.md
      - as-is/evidence-index.md
      - as-is/evidence-ledger.json
      - as-is/coverage-matrix.json
      - as-is/knowledge-candidates.md

  - id: plan
    order: 2
    description: 设计 to-be 实现方案
    requires: [understand]
    outputs:
      - to-be/implementation-plan.md
      - to-be/tasks.json
      - to-be/traceability-matrix.json
    optional_outputs:
      - to-be/impact-analysis.md
      - to-be/data-change-plan.md
      - to-be/api-change-plan.md
      - to-be/risk-and-rollback.md

  - id: implement
    order: 3
    description: 按 task 编码实现
    requires: [plan]

  - id: review
    order: 4
    description: 架构师 CR 与返修闭环
    requires: [implement]

  - id: knowledge-extract
    order: 5
    description: 从迭代产物中提取长期知识候选
    requires: [review]
    outputs:
      - knowledge-candidates/

state-machine:
  tasks:
    states: [pending, confirmed, coding, coded, reviewing, approved, needs_rework, repairing, failed, blocked]
    note: failed 仅表示本轮 coding 失败，可回到 confirmed；review/rework 优先于新 coding。
    transitions:
      - from: pending
        to: confirmed
      - from: confirmed
        to: coding
      - from: coding
        to: coded
      - from: coding
        to: failed
      - from: failed
        to: confirmed
      - from: coded
        to: reviewing
      - from: reviewing
        to: approved
      - from: reviewing
        to: needs_rework
      - from: needs_rework
        to: repairing
      - from: repairing
        to: coded
      - from: needs_rework
        to: blocked

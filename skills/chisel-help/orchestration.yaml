name: chisel-orchestration
version: 1
description: 遗留系统新增功能端到端编排

variables:
  RUNTIME_DIR: .chisel/{idea-name}
  SCRIPTS: ../../scripts

steps:
  - id: receive-requirement
    description: 接收需求并创建运行态目录
    postcondition:
      check: requirement-exists

  - id: understand:explore
    description: 理解 as-is
    action:
      type: skill
      name: chisel-understand
      args: "{idea-name}"
    postcondition:
      check: as-is-complete

  - id: understand:confirm
    description: 用户确认 as-is，回答待澄清问题并写入 clarifications.json/clarifications.md 和 confirmations/as-is.json；实时捕获知识候选
    outputs:
      - clarifications.json
      - clarifications.md
      - confirmations/as-is.json
    postcondition:
      check: as-is-confirmed

  - id: understand:generate-ai-input
    # complexity-aware: trivial 模式跳过此步，直接进入 clarify:requirement
    description: 基于已确认的 as-is 人类学习版生成面向 AI 的结构化输入
    postcondition:
      check: ai-input-ready

  - id: clarify:requirement
    description: 基于 as-is 理解和原始需求，多维度澄清用户真实意图——功能范围、影响分析、兼容约束、非功能需求、优先级、验收标准、风险容忍度
    action:
      type: skill
      name: chisel-clarify
      args: "{idea-name}"
    postcondition:
      check: clarification-complete

  - id: plan:strategy
    description: planner 产出 implementation-plan.md（方向、边界、保障策略）
    action:
      type: skill
      name: chisel-plan
      args: "{idea-name} --phase strategy"
    postcondition:
      check: strategy-exists

  - id: plan:strategy-confirm
    description: 用户确认策略方向，写入 confirmations/strategy.json；实时捕获知识候选
    outputs:
      - confirmations/strategy.json
    postcondition:
      check: strategy-confirmed

  - id: plan:decompose
    description: planner 基于已确认策略产出 tasks.json + traceability-matrix.json
    action:
      type: skill
      name: chisel-plan
      args: "{idea-name} --phase decompose"
    postcondition:
      check: to-be-exists

  - id: plan:decompose-confirm
    description: 用户确认 task 拆分，写入 confirmations/to-be.json；实时捕获知识候选
    outputs:
      - confirmations/to-be.json
    postcondition:
      check: to-be-confirmed

  - id: worktree:setup
    description: 询问用户是否创建隔离 worktree；yes → 从 main 创建 worktree；no → 在当前分支开发
    postcondition:
      check: worktree-decided

  - id: tasks:init
    description: 基于 tasks.json 初始化 task-workflow-state.yaml
    postcondition:
      check: task-workflow-exists

  - id: implement:code
    description: 按 task 依赖执行 coding subagent（无依赖 task 可并行）
    action:
      type: skill
      name: chisel-implement
      args: "{idea-name}"
    postcondition:
      check: task-report-exists

  - id: review:cr
    description: spec + D2-D7 多维 CR；spec fail 直接返修，spec pass 后并行执行 D2-D7 并聚合返修项
    action:
      type: skill
      name: chisel-review
      args: "{idea-name}"
    postcondition:
      check: cr-complete

  - id: repair:code
    description: 按 CR 返修清单修复代码
    action:
      type: skill
      name: chisel-implement
      args: "{idea-name}"
    postcondition:
      check: task-report-exists

  - id: knowledge:extract
    # complexity-aware: trivial 模式跳过此步，直接进入 final:summary
    description: 从本次迭代产物和实时捕获中提取长期知识候选，去重后写入 knowledge-candidates 目录，用户确认后合入 wiki 并激活 rule
    postcondition:
      check: knowledge-extracted

  - id: final:summary
    description: 汇总变更、CR、返修、验证方法，呈现知识候选摘要
    postcondition:
      check: done
